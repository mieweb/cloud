# Release workflow for the @mieweb/* packages.
#
# On every push to main this runs the Changesets action, which:
#   - if pending changesets exist, opens/updates a "Version Packages" PR that
#     bumps versions + writes changelogs (via `pnpm version-packages`);
#   - once that PR is merged (no pending changesets, versions bumped), publishes
#     the tarballs to npm (via `pnpm release` → `changeset publish`) and pushes
#     the git tags.
#
# Requires an `NPM_TOKEN` repo secret with publish rights to the @mieweb scope.
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Typecheck + unit tests gate the release, same as CI.
      - run: pnpm typecheck
      - run: pnpm -r test

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
